function log(msg, cls='') {
  const d = document.getElementById('log');
  d.innerHTML += `<div class="${cls}">${msg}</div>`;
  d.scrollTop = d.scrollHeight;
}
function setBar(p) { document.getElementById('bar').style.width = Math.min(p,100)+'%'; }

async function api(method, path, body) {
  const r = await fetch(URL+path, {
    method,
    headers: { apikey:KEY, Authorization:'Bearer '+KEY, 'Content-Type':'application/json', Prefer:'return=minimal' },
    body: body ? JSON.stringify(body) : undefined
  });
  const t = await r.text();
  return { ok: r.ok, status: r.status, data: t };
}

async function run() {
  document.getElementById('btn').disabled = true;
  document.getElementById('log').innerHTML = '';
  log('🔗 Supabase 연결 확인 중...', 'info');

  const test = await api('GET', '/rest/v1/articles?limit=1');
  if (!test.ok) {
    log(`❌ 연결 실패 (${test.status}): ${test.data}`, 'err');
    document.getElementById('btn').disabled = false;
    return;
  }
  log('✅ Supabase 연결 성공 — articles 테이블 확인됨', 'ok');
  log(`📰 총 ${articles.length}개 기사 삽입 시작...\n`, 'info');

  let ok=0, skip=0, fail=0;
  const batch = 10;

  for (let i=0; i<articles.length; i+=batch) {
    const chunk = articles.slice(i, i+batch);
    const r = await api('POST', '/rest/v1/articles', chunk);

    if (r.ok) {
      ok += chunk.length;
      log(`✅ ${i+1}~${Math.min(i+batch, articles.length)}번 완료`, 'ok');
    } else {
      // 개별 재시도
      for (const a of chunk) {
        const r2 = await api('POST', '/rest/v1/articles', a);
        if (r2.ok) { ok++; }
        else if (r2.data.includes('duplicate') || r2.data.includes('unique')) { skip++; }
        else { fail++; log(`  ❌ "${a.title_ko.substring(0,25)}..." — ${r2.data.substring(0,80)}`, 'err'); }
      }
    }
    setBar((i+batch)/articles.length*100);
    await new Promise(res=>setTimeout(res,100));
  }

  setBar(100);
  log('', '');
  log(`🎉 완료! 성공: ${ok}개 | 중복 스킵: ${skip}개 | 실패: ${fail}개`, 'done');
  document.getElementById('btn').disabled = false;
  document.getElementById('btn').textContent = '다시 실행';
}
</script>
